# Cloud Build for unified-domain-client
# Depends on: unified-trading-library (from Artifact Registry)
# Trigger: push to main → auto-publish to Artifact Registry

steps:
  # Step 0: Ensure unified-libraries repo exists
  - name: "gcr.io/cloud-builders/gcloud"
    id: "ensure-repo"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud artifacts repositories describe unified-libraries --location=asia-northeast1 &>/dev/null || \
          gcloud artifacts repositories create unified-libraries --repository-format=python --location=asia-northeast1 --description="Unified Python libraries"
    waitFor: ["-"]

  - name: "python:3.13-slim"
    id: "lint"
    waitFor: ["ensure-repo"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install uv
        uv pip install ruff==0.15.0
        ruff check .
        ruff format --check .

  # Cloud SDK isolation — STEP 5.10/5.11 (hard-fail on violations)
  - name: "debian:bookworm-slim"
    id: "cloud-sdk-isolation-check"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        apt-get update -qq && apt-get install -y --no-install-recommends ripgrep
        echo "=== STEP 5.10: No direct cloud SDK imports ==="
        VIOLATIONS=$(rg 'from google\.cloud import|^import boto3\b|^from boto3 import|^from botocore import' \
          --type py --glob '!.venv*' --glob '!**/providers/**' --glob '!**/cache.py' \
          . 2>/dev/null || true)
        [ -n "$VIOLATIONS" ] && { echo "STEP 5.10 FAILED — direct cloud SDK imports:"; echo "$VIOLATIONS"; exit 1; }
        echo "STEP 5.10 passed"
        echo "=== STEP 5.11: No UTL protocol-leaking symbols ==="
        UTL=$(rg 'from unified_trading_library import.*(CloudTarget|StandardizedDomainCloudService|upload_to_gcs_batch)' \
          --type py --glob '!.venv*' --glob '!tests/**' . 2>/dev/null || true)
        [ -n "$UTL" ] && { echo "STEP 5.11 FAILED — UTL protocol-leaking symbols:"; echo "$UTL"; exit 1; }
        echo "STEP 5.11 passed"
    waitFor: ["lint"]
  # Step 1.5: Run tests
  - name: "python:3.13-slim"
    id: "run-tests"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        pip install uv keyrings.google-artifactregistry-auth
        mkdir -p /root/.config/pip
        echo "[global]
        extra-index-url = https://asia-northeast1-python.pkg.dev/$PROJECT_ID/unified-libraries/simple/" > /root/.config/pip/pip.conf
        uv pip install --system -e ".[dev]"
        python -m pytest tests/ -v --tb=short
    waitFor: ["lint"]

  - name: "python:3.13-slim"
    id: "build-wheel"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        pip install uv build keyring keyrings.google-artifactregistry-auth
        mkdir -p /root/.config/pip
        echo "[global]
        extra-index-url = https://asia-northeast1-python.pkg.dev/$PROJECT_ID/unified-libraries/simple/" > /root/.config/pip/pip.conf
        uv pip install --system -e ".[dev]"
        python -m build --wheel --outdir dist/
        ls -lh dist/
    waitFor: ["run-tests"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:alpine"
    id: "store-metadata"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        apk add --no-cache python3
        WHEEL_FILE=$$(ls dist/*.whl)
        VERSION=$$(echo $$WHEEL_FILE | sed -n 's/.*-\([0-9.]*\)-.*/\1/p')
        echo "{\"version\":\"$$VERSION\",\"commit\":\"$COMMIT_SHA\"}" > /tmp/build-metadata.json
        gsutil cp /tmp/build-metadata.json gs://$PROJECT_ID-build-metadata/unified-domain-client/versions/$$VERSION.json || true
    waitFor: ["build-wheel"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:alpine"
    id: "publish-python"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        apk add --no-cache python3 py3-pip jq
        pip3 install --break-system-packages twine keyrings.google-artifactregistry-auth

        WHEEL_FILE=$$(ls dist/*.whl)
        VERSION=$$(echo $$WHEEL_FILE | sed -n 's/.*-\([0-9.]*\)-.*/\1/p')

        EXISTING_VERSIONS=$$(gcloud artifacts versions list \
          --package=unified-domain-client \
          --repository=unified-libraries \
          --location=asia-northeast1 \
          --format="value(VERSION)" 2>/dev/null || echo "")

        if echo "$$EXISTING_VERSIONS" | grep -qx "$$VERSION"; then
          if gsutil cp gs://$PROJECT_ID-build-metadata/unified-domain-client/versions/$$VERSION.json /tmp/existing-metadata.json 2>/dev/null; then
            EXISTING_COMMIT=$$(jq -r '.commit' /tmp/existing-metadata.json)
            if [ "$$EXISTING_COMMIT" = "$COMMIT_SHA" ]; then
              echo "✓ Version $$VERSION already published from commit $COMMIT_SHA (idempotent)"
              exit 0
            fi
          fi
          echo "❌ Version $$VERSION exists with different commit - bump version"
          exit 1
        fi

        python3 -m twine upload --repository-url https://asia-northeast1-python.pkg.dev/$PROJECT_ID/unified-libraries/ --non-interactive dist/*.whl
        echo "✓ Published unified-domain-client $$VERSION"
    waitFor: ["store-metadata"]

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY

timeout: "600s"
