# AWS CodeBuild Buildspec for unified-domain-client
# Library publishing — lint, test, build wheel (no Docker)

version: 0.2

env:
  secrets-manager:
    GITHUB_TOKEN: github-pat:token
  variables:
    SERVICE_NAME: "unified-domain-client"
    CLOUD_PROVIDER: "aws"

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - pip install uv

  pre_build:
    commands:
      - echo "=== Installing packages ==="
      - uv pip install -e "." || uv pip install -e .
      - uv pip install ruff pytest

  build:
    commands:
      - echo "=== Running linting ==="
      - ruff check --line-length 120 unified_domain_client/ || exit 1

      - echo "=== Running tests ==="
      - |
        if [ -d "tests" ]; then
          pytest tests/ -v --tb=short || exit 1
        else
          echo "No tests directory found, skipping"
        fi

      - echo "=== Building wheel ==="
      - uv pip install build
      - python -m build --wheel --outdir dist/

cache:
  paths:
    - "/root/.cache/pip/**/*"
