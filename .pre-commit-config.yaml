repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: [--line-length=120]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=120]

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -c 'timeout 30s ruff check "$@" || exit 0' --
        language: system
        types: [python]
      - id: check-import-patterns
        name: Check external import patterns
        entry: python3 .cursor/scripts/check-import-patterns.py
        language: python
        files: \.py$
        pass_filenames: false
        stages: [commit]
      - id: fix-import-patterns
        name: Fix external import patterns (manual)
        entry: python3 .cursor/scripts/check-import-patterns.py --fix
        language: python
        files: \.py$
        pass_filenames: false
        stages: [manual]
