name: version-bump

on:
  push:
    branches: [staging]

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Parse commit and bump version
        run: |
          set -euo pipefail

          COMMIT_MSG="${{ github.event.head_commit.message }}"
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n1)

          BUMP=""
          if echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$FIRST_LINE" | grep -qE "^[a-z]+!(\(.+\))?:"; then
            BUMP="major"
          elif echo "$FIRST_LINE" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$FIRST_LINE" | grep -qE "^fix(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "No version-bump prefix found (feat:/fix:/BREAKING CHANGE:). Skipping."
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          CURRENT=$(grep -oP '^version\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' pyproject.toml)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              # Pre-1.0.0 rule: breaking changes bump minor, not major (never auto-cross to 1.0.0).
              # 1.0.0 is only set manually when the repo passes full quickmerge under the new
              # CI/CD pipeline and all plan items are complete. See workspace-manifest versions_policy.
              if [ "$MAJOR" = "0" ]; then
                MINOR=$((MINOR + 1)); PATCH=0
              else
                MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
              fi ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $CURRENT → $NEW_VERSION ($BUMP)"

          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW_VERSION}\"/" pyproject.toml

          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "SKIP=false" >> "$GITHUB_ENV"

      - name: Commit version bump
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push

      - name: Dispatch manifest update to unified-trading-pm
        if: env.SKIP != 'true'
        run: |
          # Include the branch so PM knows whether to update versions (main) or staging_versions (staging).
          BRANCH="${{ github.ref_name }}"
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/unified-trading-pm/dispatches" \
            -d "{\"event_type\": \"version-bump\", \"client_payload\": {\"repo\": \"${{ github.event.repository.name }}\", \"version\": \"${{ env.NEW_VERSION }}\", \"branch\": \"${BRANCH}\"}}"
          echo "Dispatched manifest update: ${{ github.event.repository.name }}=${{ env.NEW_VERSION }} (branch=${BRANCH})"
