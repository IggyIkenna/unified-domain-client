name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python CI tools
        uses: IggyIkenna/unified-trading-pm/.github/actions/setup-python-tools@main
        with:
          python-version: "3.13.9"

      - name: Checkout dependencies
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DEP_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          BRANCH="${DEP_BRANCH:-main}"
          if [ -n "$GH_PAT" ]; then
            (git clone -b "$BRANCH" "https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-config-interface.git" ../unified-config-interface 2>/dev/null || git clone -b main "https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-config-interface.git" ../unified-config-interface 2>/dev/null) || :
            (git clone -b "$BRANCH" "https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-trading-library.git" ../unified-trading-library 2>/dev/null || git clone -b main "https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-trading-library.git" ../unified-trading-library 2>/dev/null) || :
            (git clone -b "$BRANCH" "https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-events-interface.git" ../unified-events-interface 2>/dev/null || git clone -b main "https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-events-interface.git" ../unified-events-interface 2>/dev/null) || :
            echo "Cloned dependencies"
          else
            echo "GH_PAT not set - install from Artifact Registry or local paths"
          fi

      - name: Install dependencies
        run: |
          uv venv .venv
          if [ -d "deps/unified-config-interface" ]; then
            uv pip install --python .venv/bin/python -e deps/unified-config-interface
            uv pip install --python .venv/bin/python -e deps/unified-trading-library
            uv pip install --python .venv/bin/python -e deps/unified-events-interface
          fi
          uv pip install --python .venv/bin/python -e ".[dev]" || uv pip install --python .venv/bin/python -e .
          uv pip install --python .venv/bin/python ruff==0.15.0 pytest pytest-cov pytest-asyncio pytest-timeout pytest-xdist basedpyright bandit pip-audit
      - name: Clone build scripts
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DEP_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          BRANCH="${DEP_BRANCH:-main}"
          (git clone -b "$BRANCH" "https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-trading-pm.git" ../unified-trading-pm 2>/dev/null \
            || git clone -b main "https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-trading-pm.git" ../unified-trading-pm 2>/dev/null) || true
          echo "✅ unified-trading-pm cloned for quality-gates base scripts"

      - name: Run quality gates
        env:
          CLOUD_PROVIDER: "local"
          CLOUD_MOCK_MODE: "true"
          GCP_PROJECT_ID: "test-project"
        run: |
          export PATH="$(pwd)/.venv/bin:$PATH"
          bash scripts/quality-gates.sh --no-fix
      - name: Record CI status
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          [ -z "${GH_PAT}" ] && echo "GH_PAT not set — skipping ci-status-update" && exit 0
          STATUS="${{ job.status == 'success' && 'PASSING' || 'FAILING' }}"
          curl -s -X POST \
            -H "Authorization: token ${GH_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/unified-trading-pm/dispatches" \
            -d "{\"event_type\": \"ci-status-update\", \"client_payload\": {\"repo\": \"${{ github.event.repository.name }}\", \"status\": \"${STATUS}\", \"sha\": \"${{ github.sha }}\"}}"
