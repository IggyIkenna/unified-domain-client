name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install UV
        run: pip install uv

      - name: Checkout dependencies
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            # Clone to ../ to match pyproject.toml path = "../repo" (SSOT: path-dependency-ci.mdc)
            git clone https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-cloud-services.git ../unified-cloud-services
            git clone https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-config-interface.git ../unified-config-interface
            git clone https://x-access-token:${GH_PAT}@github.com/IggyIkenna/unified-events-interface.git ../unified-events-interface
            echo "✅ Cloned dependencies"
          else
            echo "❌ GH_PAT not set - required for unified-domain-services (depends on UCS, UCI, UEI)" && exit 1
          fi

      - name: Install ripgrep (required for codex checks)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: |
          uv pip install --system -e ../unified-cloud-services
          uv pip install --system -e ../unified-config-interface
          uv pip install --system -e ../unified-events-interface
          uv pip install --system -e ".[dev]"
          uv pip install --system ruff==0.15.0
          uv pip install --system "basedpyright>=1.20.0"

      - name: Run quality gates
        run: bash scripts/quality-gates.sh --no-fix
